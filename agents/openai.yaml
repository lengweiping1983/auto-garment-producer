display_name: 自动化成衣生产
short_description: 从主题图或面料纹理出发，以商业级美术指导填充固定模板裁片，渲染确定性透明裁片 PNG。
default_prompt: >
  创建商业成衣美术指导方案，使用固定模板裁片和 Neo AI 面料纹理，
  然后以确定性方式渲染透明裁片，输出预览图与清单。
  遵循以下原则：
  1. 只选一个卖点（hero），放在 1–2 个关键裁片上。
  2. 大身裁片低对比度、低噪，确保零售距离可穿。
  3. 小裁片和饰边安静克制，不承载复杂叙事艺术。
  4. 绝不将叙事插画直接切割到裁片中。
  5. OpenCV/Pillow 仅使用流程生成或用户提供的面料/纯色/图案资产。
